<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo</title>
  <style>
    /* ========== 變數 ========== */
    :root {
      --bg:#F3F3F3;--bg-sidebar:#FFFFFF;--bg-card:#FFFFFF;--bg-hover:#EAEAEA;
      --bg-input:#F5F5F5;--bg-detail:#FAFAFA;--text:#1A1A1A;--text2:#555;
      --text3:#999;--border:#E0E0E0;--accent:#2564CF;--accent-lt:#DBE9FE;
      --accent-hv:#1B4EA3;--star:#F5C518;--danger:#D32F2F;--ok:#2E7D32;
      --shadow:0 2px 8px rgba(0,0,0,.08);--r:8px;--side-w:260px;--det-w:340px;
      --cat-blue:#4A90D9;--cat-red:#E74C3C;--cat-orange:#F39C12;
      --cat-green:#27AE60;--cat-purple:#8E44AD;--cat-yellow:#F1C40F;
    }
    [data-theme="dark"]{
      --bg:#1E1E1E;--bg-sidebar:#252526;--bg-card:#2D2D2D;--bg-hover:#383838;
      --bg-input:#333;--bg-detail:#2D2D2D;--text:#E0E0E0;--text2:#AAA;
      --text3:#666;--border:#444;--accent:#4A9EFF;--accent-lt:#1A3A5C;
      --accent-hv:#6BB3FF;--shadow:0 2px 8px rgba(0,0,0,.35);
    }

    /* ========== Reset ========== */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',-apple-system,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    button{cursor:pointer;font-family:inherit}
    input,textarea,select{font-family:inherit}
    .hidden{display:none!important}

    /* ========== 佈局 ========== */
    #app{display:flex;height:100vh}

    /* --- 側邊欄 --- */
    #sidebar{width:var(--side-w);min-width:var(--side-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:.25s ease;z-index:100}
    #sidebar.collapsed{margin-left:calc(var(--side-w)*-1);min-width:0;width:0;overflow:hidden}
    .side-hd{display:flex;align-items:center;gap:8px;padding:14px 14px 6px}
    .brand{font-size:1.05rem;font-weight:700;color:var(--accent)}
    .ibtn{width:34px;height:34px;border:none;background:none;border-radius:6px;font-size:1.05rem;color:var(--text2);display:flex;align-items:center;justify-content:center}
    .ibtn:hover{background:var(--bg-hover)}

    .side-search{display:flex;align-items:center;gap:6px;margin:6px 10px;padding:7px 10px;background:var(--bg-input);border-radius:var(--r);border:1px solid var(--border)}
    .side-search input{flex:1;border:none;background:none;outline:none;color:var(--text);font-size:.85rem}

    .snav{padding:4px 6px}
    .snav-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:none;background:none;border-radius:var(--r);color:var(--text);font-size:.88rem;text-align:left;transition:.15s}
    .snav-item:hover{background:var(--bg-hover)}
    .snav-item.active{background:var(--accent-lt);color:var(--accent);font-weight:600}
    .snav-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
    .snav-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .snav-cnt{font-size:.7rem;color:var(--text3);background:var(--bg-hover);padding:1px 7px;border-radius:10px}
    .snav-cnt:empty{display:none}

    .side-div{border:none;border-top:1px solid var(--border);margin:6px 14px}
    .side-ft{padding:4px 6px}
    .add-list-btn{color:var(--accent)}
    .add-list-btn:hover{background:var(--accent-lt)}

    .side-bottom{margin-top:auto;padding:10px;display:flex;gap:4px;border-top:1px solid var(--border)}

    /* 自訂清單項 */
    .list-wrap{display:flex;align-items:center}
    .list-wrap .snav-item{flex:1}
    .list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .list-acts{display:none;gap:2px}
    .list-wrap:hover .list-acts{display:flex}
    .la-btn{width:26px;height:26px;border:none;background:none;border-radius:4px;font-size:.75rem;color:var(--text3)}
    .la-btn:hover{background:var(--bg-hover);color:var(--text)}

    /* --- 主區 --- */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    #main-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 6px;flex-shrink:0}
    .hd-left{flex:1}
    #v-title{font-size:1.2rem;font-weight:700;color:var(--accent)}
    .hd-date{font-size:.78rem;color:var(--text3);margin-top:1px;display:block}
    .hd-acts{display:flex;gap:4px}

    /* 排序 */
    .sort-wrap{position:relative}
    .sort-menu{position:absolute;top:38px;right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);z-index:50;min-width:150px;overflow:hidden}
    .sort-menu button{display:block;width:100%;padding:9px 14px;border:none;background:none;text-align:left;color:var(--text);font-size:.83rem}
    .sort-menu button:hover{background:var(--bg-hover)}

    /* 建議 */
    .sug-panel{margin:0 22px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
    .sug-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .sug-hd h3{font-size:.88rem}
    .sug-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border:none;background:none;border-radius:6px;color:var(--text);font-size:.83rem;text-align:left;width:100%}
    .sug-item:hover{background:var(--bg-hover)}

    /* 新增任務 */
    .add-bar{display:flex;align-items:center;gap:10px;margin:10px 22px;padding:11px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);transition:.2s}
    .add-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-lt)}
    .add-circle{width:26px;height:26px;border:2px solid var(--accent);border-radius:50%;background:none;color:var(--accent);font-size:.95rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .add-bar input{flex:1;border:none;background:none;outline:none;color:var(--text);font-size:.9rem}
    .add-bar input::placeholder{color:var(--text3)}
    .sc-btns{display:flex;gap:2px}
    .sc-btn{width:30px;height:30px;border:none;background:none;border-radius:4px;font-size:.9rem;opacity:.45;transition:.15s}
    .sc-btn:hover{opacity:1}
    .sc-btn.on{opacity:1;background:var(--accent-lt)}

    /* 任務列表容器 */
    .tl-wrap{flex:1;overflow-y:auto;padding:0 22px 22px}

    /* 任務卡 */
    .tl{display:flex;flex-direction:column;gap:2px}
    .tc{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--bg-card);border-radius:var(--r);border:1px solid transparent;transition:.15s;cursor:pointer;user-select:none}
    .tc:hover{background:var(--bg-hover)}
    .tc.sel{border-color:var(--accent);background:var(--accent-lt)}
    .tc.done{opacity:.65}

    .tcheck{width:21px;height:21px;border:2px solid var(--text3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.65rem;color:transparent;transition:.15s}
    .tcheck:hover{border-color:var(--accent)}
    .tc.done .tcheck{background:var(--ok);border-color:var(--ok);color:#fff}

    .tbody{flex:1;min-width:0}
    .ttitle{font-size:.88rem;line-height:1.4;word-break:break-word}
    .tc.done .ttitle{text-decoration:line-through;color:var(--text3)}
    .tmeta{display:flex;align-items:center;gap:7px;margin-top:2px;font-size:.72rem;color:var(--text3);flex-wrap:wrap}
    .mi{display:flex;align-items:center;gap:2px}
    .mi.overdue{color:var(--danger)}
    .mi.today{color:var(--accent)}
    .cdots{display:flex;gap:3px}
    .cdot{width:7px;height:7px;border-radius:50%}

    .tstar{width:28px;height:28px;border:none;background:none;font-size:1.05rem;flex-shrink:0;color:var(--text3);transition:.15s}
    .tstar:hover{color:var(--star)}
    .tstar.on{color:var(--star)}

    /* 已完成折疊 */
    .comp-sec{margin-top:14px}
    .comp-tog{display:flex;align-items:center;gap:7px;width:100%;padding:9px 14px;border:none;background:none;color:var(--text2);font-size:.83rem;font-weight:600;border-radius:var(--r)}
    .comp-tog:hover{background:var(--bg-hover)}
    .tog-arrow{transition:transform .2s;font-size:.65rem}
    .tog-arrow.open{transform:rotate(90deg)}

    /* 空狀態 */
    .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
    .empty-ic{font-size:3.5rem;margin-bottom:14px}
    .empty h3{font-size:1.1rem;margin-bottom:6px}
    .empty p{color:var(--text3);font-size:.88rem}

    /* --- 詳情面板 --- */
    #detail{width:var(--det-w);min-width:var(--det-w);background:var(--bg-detail);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:.2s}
    #detail.hidden{display:none}
    .det-hd{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
    .det-body{padding:14px;flex:1}
    .det-title-row{display:flex;align-items:center;gap:9px;margin-bottom:14px}
    .dcheck{width:23px;height:23px;border:2px solid var(--text3);border-radius:50%;background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:transparent;transition:.15s}
    .dcheck.on{background:var(--ok);border-color:var(--ok);color:#fff}
    .dtitle-in{flex:1;border:none;background:none;outline:none;font-size:1.05rem;font-weight:600;color:var(--text)}
    .dtitle-in.line{text-decoration:line-through;color:var(--text3)}
    .dstar{width:30px;height:30px;border:none;background:none;font-size:1.2rem;color:var(--text3)}
    .dstar.on{color:var(--star)}

    .det-sec{margin-bottom:10px}
    .steps-list{display:flex;flex-direction:column;gap:2px}
    .step{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px}
    .step:hover{background:var(--bg-hover)}
    .scheck{width:17px;height:17px;border:2px solid var(--text3);border-radius:50%;background:none;flex-shrink:0;font-size:.55rem;display:flex;align-items:center;justify-content:center;color:transparent;cursor:pointer}
    .scheck.on{background:var(--ok);border-color:var(--ok);color:#fff}
    .stitle{flex:1;border:none;background:none;outline:none;color:var(--text);font-size:.83rem}
    .stitle.line{text-decoration:line-through;color:var(--text3)}
    .sdel{width:22px;height:22px;border:none;background:none;color:var(--text3);font-size:.75rem;display:none}
    .step:hover .sdel{display:flex;align-items:center;justify-content:center}

    .add-step{display:flex;align-items:center;gap:7px;padding:5px 7px}
    .add-step span{color:var(--accent);font-size:.85rem}
    .add-step input{flex:1;border:none;background:none;outline:none;color:var(--text);font-size:.83rem}

    .dact{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border:none;background:none;border-radius:6px;color:var(--text);font-size:.83rem;cursor:pointer;text-align:left;position:relative}
    .dact:hover{background:var(--bg-hover)}
    .dact.on{color:var(--accent)}
    .clr-btn{position:absolute;right:7px;width:22px;height:22px;border:none;background:none;color:var(--text3);font-size:.75rem;border-radius:50%;cursor:pointer}
    .clr-btn:hover{background:var(--bg-hover)}

    .cat-chips{display:flex;gap:5px;padding:3px 11px;flex-wrap:wrap}
    .cat-chip{padding:2px 9px;border-radius:11px;font-size:.72rem;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;gap:3px}
    .cat-chip .rx{background:none;border:none;color:#fff;cursor:pointer;font-size:.65rem;opacity:.7;padding:0}
    .cat-chip .rx:hover{opacity:1}
    .cat-pick{display:flex;gap:5px;padding:6px 11px;flex-wrap:wrap}
    .cpk{padding:3px 9px;border-radius:11px;font-size:.72rem;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer}
    .cpk:hover{border-color:var(--accent)}

    .notes-sec textarea{width:100%;border:1px solid var(--border);background:var(--bg-input);color:var(--text);border-radius:var(--r);padding:9px;font-size:.83rem;resize:vertical;outline:none;min-height:70px}
    .notes-sec textarea:focus{border-color:var(--accent)}

    .det-ft{padding:10px 14px;border-top:1px solid var(--border);font-size:.72rem;color:var(--text3);text-align:center}
    .danger-text{color:var(--danger)!important}

    /* --- 日期快捷 --- */
    .dq-menu{position:fixed;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);z-index:200;min-width:170px;overflow:hidden}
    .dq-menu button{display:block;width:100%;padding:9px 14px;border:none;background:none;text-align:left;color:var(--text);font-size:.83rem}
    .dq-menu button:hover{background:var(--bg-hover)}

    /* --- Toast --- */
    .toast-wrap{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;align-items:center;gap:7px}
    .toast{background:var(--bg-card);color:var(--text);padding:9px 18px;border-radius:var(--r);box-shadow:var(--shadow);font-size:.83rem;border-left:4px solid var(--accent);animation:toastIn .25s ease}
    @keyframes toastIn{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* --- Mobile --- */
    .mob{display:none}
    @media(max-width:900px){
      #detail{position:fixed;right:0;top:0;height:100vh;z-index:150;box-shadow:var(--shadow)}
    }
    @media(max-width:700px){
      :root{--side-w:260px;--det-w:100vw}
      #sidebar{position:fixed;left:0;top:0;height:100vh;z-index:200;box-shadow:var(--shadow)}
      #sidebar.collapsed{margin-left:calc(var(--side-w)*-1)}
      .mob{display:flex}
      #sidebar .side-hd .ibtn:first-child{display:none}
      #main-hd{padding:14px 14px 6px}
      .add-bar{margin:10px 14px}
      .tl-wrap{padding:0 14px 14px}
      #detail{width:100vw;min-width:100vw}
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 側邊欄 -->
    <aside id="sidebar" class="collapsed">
      <div class="side-hd">
        <button class="ibtn" onclick="toggleSidebar()">☰</button>
        <span class="brand">My Todo</span>
      </div>
      <div class="side-search">
        <span style="font-size:.85rem;color:var(--text3)">🔍</span>
        <input type="text" id="search-in" placeholder="搜尋" autocomplete="off" />
      </div>
      <nav class="snav" id="smart-lists"></nav>
      <hr class="side-div" />
      <nav class="snav" id="custom-lists"></nav>
      <div class="side-ft">
        <button class="snav-item add-list-btn" onclick="addNewList()">
          <span class="snav-icon">＋</span><span class="snav-lbl">新增清單</span>
        </button>
      </div>
      <div class="side-bottom">
        <button class="ibtn" onclick="toggleTheme()" title="切換主題">🌓</button>
        <button class="ibtn" onclick="doExport()" title="匯出">📤</button>
        <button class="ibtn" onclick="doImport()" title="匯入">📥</button>
      </div>
    </aside>

    <!-- 主區 -->
    <main id="main">
      <header id="main-hd">
        <button class="ibtn mob" onclick="toggleSidebar()">☰</button>
        <div class="hd-left">
          <h2 id="v-title">☀️ 我的一天</h2>
          <span class="hd-date" id="v-date"></span>
        </div>
        <div class="hd-acts">
          <div class="sort-wrap">
            <button class="ibtn" onclick="toggleSort()" title="排序">⇅</button>
            <div class="sort-menu hidden" id="sort-menu"></div>
          </div>
          <button class="ibtn" id="sug-btn" onclick="toggleSug()" title="建議">💡</button>
        </div>
      </header>

      <div class="sug-panel hidden" id="sug-panel">
        <div class="sug-hd">
          <h3>💡 建議</h3>
          <button class="ibtn" onclick="toggleSug()">✕</button>
        </div>
        <div id="sug-list"></div>
      </div>

      <div class="add-bar">
        <button class="add-circle" onclick="document.getElementById('add-in').focus()">＋</button>
        <input type="text" id="add-in" placeholder="新增任務" autocomplete="off" />
        <div class="sc-btns">
          <button class="sc-btn" id="sc-myday" title="加入我的一天" onclick="toggleSc('myday')">☀️</button>
          <button class="sc-btn" id="sc-imp" title="重要" onclick="toggleSc('imp')">⭐</button>
          <button class="sc-btn" id="sc-due" title="今天到期" onclick="toggleSc('due')">📅</button>
        </div>
      </div>

      <div class="tl-wrap" id="tl-wrap">
        <div class="tl" id="task-list"></div>
        <div class="comp-sec hidden" id="comp-sec">
          <button class="comp-tog" id="comp-tog">
            <span class="tog-arrow" id="tog-arrow">▶</span>
            已完成 <span id="comp-cnt">0</span>
          </button>
          <div class="tl hidden" id="comp-list"></div>
        </div>
      </div>

      <div class="empty hidden" id="empty-st">
        <div class="empty-ic" id="emp-ic">☀️</div>
        <h3 id="emp-t">專注你的一天</h3>
        <p id="emp-d">你今天想完成什麼？</p>
      </div>
    </main>

    <!-- 詳情 -->
    <aside id="detail" class="hidden">
      <div class="det-hd">
        <button class="ibtn" onclick="closeDetail()">✕</button>
        <button class="ibtn danger-text" id="del-btn" title="刪除">🗑️</button>
      </div>
      <div class="det-body">
        <div class="det-title-row">
          <button class="dcheck" id="d-check"></button>
          <input type="text" class="dtitle-in" id="d-title" />
          <button class="dstar" id="d-star">☆</button>
        </div>

        <div class="det-sec">
          <div class="steps-list" id="d-steps"></div>
          <div class="add-step">
            <span>＋</span>
            <input type="text" id="d-add-step" placeholder="新增步驟" />
          </div>
        </div>

        <button class="dact" id="d-myday"><span>☀️</span><span id="d-myday-t">加入「我的一天」</span></button>

        <div class="dact" id="d-rem-btn">
          <span>🔔</span><span id="d-rem-t">提醒我</span>
          <button class="clr-btn hidden" id="clr-rem">✕</button>
        </div>
        <input type="datetime-local" id="d-rem-in" class="hidden" style="margin:0 11px 6px;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:.83rem" />

        <div class="dact" id="d-due-btn">
          <span>📅</span><span id="d-due-t">新增到期日</span>
          <button class="clr-btn hidden" id="clr-due">✕</button>
        </div>
        <input type="date" id="d-due-in" class="hidden" style="margin:0 11px 6px;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:.83rem" />

        <div class="dact" id="d-rep-btn">
          <span>🔁</span><span id="d-rep-t">重複</span>
        </div>
        <select id="d-rep-sel" class="hidden" style="margin:0 11px 6px;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:.83rem;width:calc(100% - 22px)">
          <option value="">不重複</option>
          <option value="daily">每天</option>
          <option value="weekdays">每個工作日</option>
          <option value="weekly">每週</option>
          <option value="monthly">每月</option>
          <option value="yearly">每年</option>
        </select>

        <div class="det-sec">
          <button class="dact" id="d-cat-btn"><span>🏷️</span><span>分類標籤</span></button>
          <div class="cat-chips" id="d-cat-chips"></div>
          <div class="cat-pick hidden" id="d-cat-pick"></div>
        </div>

        <div class="det-sec notes-sec">
          <textarea id="d-notes" placeholder="新增備註" rows="3"></textarea>
        </div>
      </div>
      <div class="det-ft" id="d-created"></div>
    </aside>
  </div>

  <!-- 日期快捷 -->
  <div class="dq-menu hidden" id="dq-menu"></div>

  <!-- Toast -->
  <div class="toast-wrap" id="toast-wrap"></div>

<script>
/* ================================================================
   STORE
   ================================================================ */
const SK='mytodo_v2';
const CATS={blue:'#4A90D9',red:'#E74C3C',orange:'#F39C12',green:'#27AE60',purple:'#8E44AD',yellow:'#F1C40F'};

function defData(){return{lists:[],tasks:[],settings:{theme:'light',sort:'default',view:'myday',sidebarOff:true}}}
const D={_d:null,
  load(){try{const r=localStorage.getItem(SK);if(!r){this._d=defData();return}const p=JSON.parse(r);const d=defData();this._d={...d,...p,settings:{...d.settings,...(p.settings||{})}}}catch(e){this._d=defData()}},
  save(){try{localStorage.setItem(SK,JSON.stringify(this._d))}catch(e){}},
  get d(){if(!this._d)this.load();return this._d},
  addTask(t){this._d.tasks.push(t);this.save()},
  updTask(id,u){const t=this._d.tasks.find(x=>x.id===id);if(t)Object.assign(t,u);this.save();return t},
  delTask(id){this._d.tasks=this._d.tasks.filter(x=>x.id!==id);this.save()},
  getTask(id){return this._d.tasks.find(x=>x.id===id)},
  addList(l){this._d.lists.push(l);this.save()},
  updList(id,u){const l=this._d.lists.find(x=>x.id===id);if(l)Object.assign(l,u);this.save()},
  delList(id){this._d.lists=this._d.lists.filter(x=>x.id!==id);this._d.tasks=this._d.tasks.filter(x=>x.listId!==id);this.save()},
};

/* ================================================================
   HELPERS
   ================================================================ */
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtD(d){if(!d)return'';if(typeof d==='string')d=new Date(d);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function todayStr(){return fmtD(new Date())}
function fmtDisp(s){if(!s)return'';const d=new Date(s+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);const tm=new Date(t);tm.setDate(tm.getDate()+1);if(d.getTime()===t.getTime())return'今天';if(d.getTime()===tm.getTime())return'明天';const y=new Date(t);y.setDate(y.getDate()-1);if(d.getTime()===y.getTime())return'昨天';const o={month:'short',day:'numeric'};if(d.getFullYear()!==t.getFullYear())o.year='numeric';return d.toLocaleDateString('zh-TW',o)}
function fmtDT(s){if(!s)return'';return new Date(s).toLocaleString('zh-TW',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function isOver(s){if(!s)return false;return new Date(s+'T23:59:59')<new Date()}
function isToday(s){return s===todayStr()}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function getByView(v,comp){
  const ts=D.d.tasks,td=todayStr();
  return ts.filter(t=>{
    if(comp?!t.completed:t.completed)return false;
    switch(v){
      case'myday':return t.myDay===td;
      case'important':return t.important;
      case'planned':return!!t.dueDate;
      case'all':return true;
      case'completed':return comp?false:true;
      default:return t.listId===v;
    }
  });
}

function sortArr(arr,type){
  const a=[...arr];
  switch(type){
    case'alpha':return a.sort((x,y)=>x.title.localeCompare(y.title,'zh'));
    case'alpha-desc':return a.sort((x,y)=>y.title.localeCompare(x.title,'zh'));
    case'due':return a.sort((x,y)=>(x.dueDate||'9').localeCompare(y.dueDate||'9'));
    case'created':return a.sort((x,y)=>y.createdAt.localeCompare(x.createdAt));
    case'important':return a.sort((x,y)=>(y.important?1:0)-(x.important?1:0));
    default:return a;
  }
}

  const tl=document.getElementById('task-list');
  const cs=document.getElementById('comp-sec');
  const cl=document.getElementById('comp-list');
  const em=document.getElementById('empty-st');

  tl.innerHTML='';cl.innerHTML='';

  // For "completed" view, show all completed tasks in main list
  if(v==='completed'){
    const allComp=sortArr(D.d.tasks.filter(t=>t.completed),D.d.settings.sort);
    if(allComp.length===0){em.classList.remove('hidden');cs.classList.add('hidden');setEmpty(v);return}
    em.classList.add('hidden');cs.classList.add('hidden');

function mkCard(t){
  const d=document.createElement('div');
  d.className='tc'+(t.completed?' done':'')+(curId===t.id?' sel':'');
  const ts2=t.steps||[],totS=ts2.length,doneS=ts2.filter(s=>s.completed).length;
  let metas=[];
  const v=D.d.settings.view;
  if(t.myDay===todayStr()&&v!=='myday')metas.push('<span class="mi">☀️</span>');
  if(t.dueDate){const cls=t.completed?'':isOver(t.dueDate)?'overdue':isToday(t.dueDate)?'today':'';metas.push(`<span class="mi ${cls}">📅 ${fmtDisp(t.dueDate)}</span>`)}
  if(t.repeat)metas.push('<span class="mi">🔁</span>');
  if(t.reminder)metas.push(`<span class="mi">🔔 ${fmtDT(t.reminder)}</span>`);
  if(totS>0)metas.push(`<span class="mi">📝 ${doneS}/${totS}</span>`);
  if(t.listId){const l=D.d.lists.find(x=>x.id===t.listId);if(l)metas.push(`<span class="mi">📂 ${esc(l.name)}</span>`)}
  if(t.categories&&t.categories.length){const dots=t.categories.map(c=>`<span class="cdot" style="background:${CATS[c]||'#999'}"></span>`).join('');metas.push(`<span class="cdots">${dots}</span>`)}
  const metaH=metas.length?`<div class="tmeta">${metas.join('')}</div>`:'';

  d.innerHTML=`
    <div class="tcheck">${t.completed?'✓':''}</div>
    <div class="tbody"><div class="ttitle">${esc(t.title)}</div>${metaH}</div>
    <button class="tstar${t.important?' on':''}">${t.important?'★':'☆'}</button>`;

  d.querySelector('.tcheck').onclick=e=>{e.stopPropagation();toggleComp(t.id)};
  d.querySelector('.tbody').onclick=()=>openDetail(t.id);
  d.querySelector('.tstar').onclick=e=>{e.stopPropagation();toggleImp(t.id)};
  return d;
}

function toggleComp(id){
  const t=D.getTask(id);if(!t)return;
  t.completed=!t.completed;
  t.completedAt=t.completed?new Date().toISOString():'';
  if(t.completed&&t.repeat){
    const nd=nextRep(t.dueDate,t.repeat);
    if(nd){const n={...JSON.parse(JSON.stringify(t)),id:gid(),completed:false,completedAt:'',dueDate:nd,createdAt:new Date().toISOString()};n.steps=(t.steps||[]).map(s=>({...s,completed:false}));D.addTask(n)}
  }
  D.save();renderAll();
  if(curId===id)renderDet(id);
}

function toggleImp(id){
  const t=D.getTask(id);if(!t)return;
  t.important=!t.important;D.save();renderAll();
  if(curId===id)renderDet(id);
}

function nextRep(due,rep){
  const b=due?new Date(due+'T00:00:00'):new Date();
  switch(rep){
    case'daily':b.setDate(b.getDate()+1);break;
    case'weekdays':do{b.setDate(b.getDate()+1)}while(b.getDay()===0||b.getDay()===6);break;
    case'weekly':b.setDate(b.getDate()+7);break;
    case'monthly':b.setMonth(b.getMonth()+1);break;
    case'yearly':b.setFullYear(b.getFullYear()+1);break;
    default:return'';
  }
  return fmtD(b);
}

  remIn.onchange=()=>{D.updTask(id,{reminder:remIn.value?new Date(remIn.value).toISOString():''});remIn.classList.add('hidden');renderDet(id);renderTasks()};
  clrR.onclick=e=>{e.stopPropagation();D.updTask(id,{reminder:''});renderDet(id);renderTasks()};

  // Due
  const dueT=document.getElementById('d-due-t'),dueIn=document.getElementById('d-due-in'),dueBtn=document.getElementById('d-due-btn'),clrD=document.getElementById('clr-due');

    showDQ(dueBtn,ds=>{D.updTask(id,{dueDate:ds});renderDet(id);renderAll()},()=>{dueIn.classList.remove('hidden');dueIn.focus()});
  };

  dueIn.onchange=()=>{D.updTask(id,{dueDate:dueIn.value});dueIn.classList.add('hidden');renderDet(id);renderAll()};
  clrD.onclick=e=>{e.stopPropagation();D.updTask(id,{dueDate:''});renderDet(id);renderAll()};

  // Repeat
  const repT=document.getElementById('d-rep-t'),repS=document.getElementById('d-rep-sel'),repB=document.getElementById('d-rep-btn');
  const repL={'':'重複',daily:'每天',weekdays:'每個工作日',weekly:'每週',monthly:'每月',yearly:'每年'};
  repT.textContent=repL[t.repeat||'']||'重複';repB.className='dact'+(t.repeat?' on':'');
  repB.onclick=()=>repS.classList.toggle('hidden');
  repS.value=t.repeat||'';
  repS.onchange=()=>{D.updTask(id,{repeat:repS.value});repS.classList.add('hidden');renderDet(id);renderTasks()};

  // Categories
  renderCats(t);

  // Notes
  const no=document.getElementById('d-notes');no.value=t.notes||'';

function renderSteps(t){
  const c=document.getElementById('d-steps');c.innerHTML='';
  if(!t.steps)t.steps=[];
  t.steps.forEach((s,i)=>{
    const d=document.createElement('div');d.className='step';

    d.querySelector('.stitle').oninput=e=>{t.steps[i].title=e.target.value;D.save()};

    const q=inp.value.trim().toLowerCase();

function renderSearch(q){
  const res=D.d.tasks.filter(t=>{
    return t.title.toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q)||(t.steps||[]).some(s=>s.title.toLowerCase().includes(q));
  });
  const tl=document.getElementById('task-list'),cs=document.getElementById('comp-sec'),em=document.getElementById('empty-st');
  tl.innerHTML='';cs.classList.add('hidden');
  if(!res.length){em.classList.remove('hidden');document.getElementById('emp-ic').textContent='🔍';document.getElementById('emp-t').textContent='找不到結果';document.getElementById('emp-d').textContent=`找不到「${q}」相關任務`;return}
  em.classList.add('hidden');
  document.getElementById('v-title').textContent=`🔍 搜尋「${q}」（${res.length} 筆）`;
  res.forEach(t=>tl.appendChild(mkCard(t)));
}

/* ================================================================
   SORT
   ================================================================ */
function toggleSort(){document.getElementById('sort-menu').classList.toggle('hidden')}

function initSort(){
  const m=document.getElementById('sort-menu');m.innerHTML='';
  [{k:'default',l:'預設'},{k:'alpha',l:'名稱 A→Z'},{k:'alpha-desc',l:'名稱 Z→A'},{k:'due',l:'到期日'},{k:'created',l:'建立日期'},{k:'important',l:'重要性'}].forEach(o=>{
    const b=document.createElement('button');b.textContent=o.l;
    b.onclick=()=>{D.d.settings.sort=o.k;D.save();m.classList.add('hidden');renderTasks();toast('排序：'+o.l)};
    m.appendChild(b);
  });
  document.addEventListener('click',e=>{if(!m.contains(e.target)&&!m.previousElementSibling?.contains(e.target))m.classList.add('hidden')});
}

/* ================================================================
   SUGGESTIONS
   ================================================================ */
function toggleSug(){document.getElementById('sug-panel').classList.toggle('hidden');renderSug()}
function renderSug(){
  const c=document.getElementById('sug-list');c.innerHTML='';
  const td=todayStr();
  const sugs=D.d.tasks.filter(t=>!t.completed&&t.myDay!==td&&(t.important||t.dueDate)).slice(0,10);
  if(!sugs.length){c.innerHTML='<p style="color:var(--text3);font-size:.83rem;padding:6px">沒有建議</p>';return}
  sugs.forEach(t=>{
    const b=document.createElement('button');b.className='sug-item';
    b.innerHTML=`<span>${t.important?'⭐':'📋'}</span><span style="flex:1">${esc(t.title)}</span><span style="font-size:.72rem;color:var(--text3)">${t.dueDate?fmtDisp(t.dueDate):''}</span><span style="color:var(--accent)">＋</span>`;
    b.onclick=()=>{D.updTask(t.id,{myDay:td});renderSug();renderAll();toast('已加入「我的一天」')};
    c.appendChild(b);
  });
}

/* ================================================================
   COMPLETED TOGGLE
   ================================================================ */
function initCompToggle(){
  document.getElementById('comp-tog').onclick=()=>{
    const cl=document.getElementById('comp-list'),ar=document.getElementById('tog-arrow');
    cl.classList.toggle('hidden');ar.classList.toggle('open');
  };
}

/* ================================================================
   THEME
   ================================================================ */
function applyTheme(){document.documentElement.setAttribute('data-theme',D.d.settings.theme||'light')}
function toggleTheme(){
  const n=D.d.settings.theme==='dark'?'light':'dark';
  D.d.settings.theme=n;D.save();applyTheme();
  toast(n==='dark'?'🌙 深色模式':'☀️ 淺色模式');
}

/* ================================================================
   EXPORT / IMPORT
   ================================================================ */
function doExport(){
  const j=JSON.stringify(D.d,null,2),b=new Blob([j],{type:'application/json'}),u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='mytodo_'+fmtD(new Date())+'.json';a.click();URL.revokeObjectURL(u);toast('📤 已匯出');
}
function doImport(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d&&Array.isArray(d.tasks)){const df=defData();D._d={...df,...d,settings:{...df.settings,...(d.settings||{})}};D.save();renderAll();switchView('myday');toast('📥 已匯入')}}catch(e){toast('❌ 匯入失敗')}};
    r.readAsText(f)};
  i.click();
}

/* ================================================================
   TOAST
   ================================================================ */
function toast(msg){
  const c=document.getElementById('toast-wrap'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2500);
}

/* ================================================================
   KEYBOARD SHORTCUTS
   ================================================================ */
function initKeys(){
  document.onkeydown=e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();document.getElementById('add-in').focus()}
    if((e.ctrlKey||e.metaKey)&&e.key==='/'){e.preventDefault();document.getElementById('search-in').focus()}
    if(e.key==='Escape'){if(curId)closeDetail();document.getElementById('dq-menu').classList.add('hidden')}
  };
}

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded',()=>{
  D.load();
  applyTheme();
  if(D.d.settings.sidebarOff)document.getElementById('sidebar').classList.add('collapsed');
  else document.getElementById('sidebar').classList.remove('collapsed');
  initAddBar();
  initSearch();
  initSort();
  initCompToggle();
  initKeys();
  switchView(D.d.settings.view||'myday');
});
</script>
</body>
</html>
